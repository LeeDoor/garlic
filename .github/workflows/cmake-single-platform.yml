name: CMake Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install CMake
      uses: lukka/get-cmake@vlatest 
      with:
        cmakeVersion: 4.1.x

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build
      run: cmake --build build
    - name: Test
      run: ctest --test-dir build --output-on-failure --timeout 4
